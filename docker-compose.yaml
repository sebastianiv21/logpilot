# LogPilot MVP: Loki, Prometheus, Grafana, PostgreSQL+pgvector (quickstart ports)
# Start: docker compose up -d

services:
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki-data:/loki
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.0.0
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --web.enable-lifecycle
    volumes:
      - prometheus-data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: logpilot
      POSTGRES_USER: logpilot
      POSTGRES_PASSWORD: logpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOKI_URL: http://loki:3100
      PROMETHEUS_URL: http://prometheus:9090
      DATABASE_URL: postgresql://logpilot:logpilot@postgres:5432/logpilot
      # Container-side knowledge paths are fixed. Configure the host-side
      # source dirs via KNOWLEDGE_CODE_HOST_PATH / KNOWLEDGE_DOC_HOST_PATH in .env.
      KNOWLEDGE_CODE_SOURCES: /knowledge/code
      KNOWLEDGE_DOC_SOURCES: /knowledge/docs
    env_file:
      - .env
    volumes:
      # Two independent bind mounts. Defaults to in-repo empty dirs so compose
      # still boots without any knowledge configured.
      - ${KNOWLEDGE_CODE_HOST_PATH:-./knowledge/code}:/knowledge/code:ro
      - ${KNOWLEDGE_DOC_HOST_PATH:-./knowledge/docs}:/knowledge/docs:ro
    deploy:
      resources:
        limits:
          # Ingest loads many chunks + embeddings in memory; 512M caused OOM. Raise if you index very large trees.
          memory: 2G
        reservations:
          memory: 256M
    depends_on:
      grafana:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  postgres-data:
